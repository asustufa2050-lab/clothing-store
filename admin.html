<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h1>👑 Admin Panel</h1>

<h2>Login</h2>
<input id="email" placeholder="Email" />
<input id="password" type="password" placeholder="Password" />
<button onclick="login()">Login</button>

<hr>

<h2>Add Product</h2>
<input id="name" placeholder="Product Name" /><br><br>
<input id="price" placeholder="Price" /><br><br>
<input id="image" placeholder="Image URL" /><br><br>

<button onclick="addProduct()">Add Product</button>

<p id="status"></p>

<script>
let token = "";

// 🔐 LOGIN
async function login(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  });

  const data = await res.json();
  token = data.token;

  document.getElementById("status").innerText = "Logged in as admin ✅";
}

// ➕ ADD PRODUCT
async function addProduct(){
  const product = {
    name: document.getElementById('name').value,
    price: document.getElementById('price').value,
    image: document.getElementById('image').value
  };

  const res = await fetch('https://clothing-store-2-vahe.onrender.com/products',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization': token
    },
    body: JSON.stringify(product)
  });

  if(res.status === 403){
    document.getElementById("status").innerText = "❌ Not Admin!";
    return;
  }

  document.getElementById("status").innerText = "✅ Product Added!";
}
</script>

</body>
</html>
