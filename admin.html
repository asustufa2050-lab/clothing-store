<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #fff;
      color: #111;
    }

    header {
      padding: 20px 40px;
      border-bottom: 1px solid #eee;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 30px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
    }

    button {
      padding: 12px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      width: 100%;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
      gap: 30px;
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    .price {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
    }

    .delete {
      background: white;
      color: black;
      border: 1px solid black;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>ADMIN DASHBOARD</header>

<div class="container">

  <h3>Add Product</h3>
  <input id="name" placeholder="Product Name">
  <input id="price" type="number" placeholder="Price">
  <input id="image" placeholder="Image URL">
  <button onclick="addProduct()">Add Product</button>

  <h3 style="margin-top:40px;">Products</h3>
  <div class="products" id="products"></div>

</div>

<script>

async function addProduct(){
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const image = document.getElementById('image').value;

  const res = await fetch('https://clothing-store-2-vahe.onrender.com/products', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ name, price, image })
  });

  if(res.ok){
    alert("Product added");
    loadProducts();
  } else {
    alert("Error adding product");
  }
}

async function deleteProduct(id){
  await fetch(`https://clothing-store-2-vahe.onrender.com/products/${id}`, {
    method:'DELETE'
  });

  loadProducts();
}

async function loadProducts(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/products');
  const data = await res.json();

  const container = document.getElementById('products');
  container.innerHTML = '';

  data.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" />
        <h4>${p.name}</h4>
        <div class="price">₹${p.price}</div>
        <button class="delete" onclick="deleteProduct('${p._id}')">Delete</button>
      </div>
    `;
  });
}

loadProducts();

</script>

</body>
</html>
