<!DOCTYPE html>
<html>
<head>
  <title>Clothing Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #fff;
      color: #111;
    }

    /* NAVBAR */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: white;
      z-index: 100;
    }

    .logo {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .nav-right {
      display: flex;
      gap: 15px;
    }

    input {
      padding: 8px;
      border: 1px solid #ddd;
      font-size: 12px;
    }

    button {
      padding: 8px 12px;
      border: 1px solid black;
      background: black;
      color: white;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 1px;
    }

    button:hover {
      background: white;
      color: black;
    }

    /* HERO */
    .hero {
      height: 60vh;
      background: url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
      font-weight: 300;
      letter-spacing: 4px;
    }

    /* PRODUCTS */
    .container {
      padding: 40px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 40px;
    }

    .card {
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      transition: 0.3s;
    }

    .card img:hover {
      opacity: 0.85;
    }

    .card h3 {
      font-size: 14px;
      font-weight: 400;
      margin: 10px 0 5px;
    }

    .price {
      font-size: 13px;
      color: #555;
    }

    /* FOOTER */
    footer {
      margin-top: 60px;
      padding: 40px;
      text-align: center;
      font-size: 12px;
      color: #777;
      border-top: 1px solid #eee;
    }

    /* MOBILE */
    @media(max-width: 600px){
      header {
        flex-direction: column;
        gap: 10px;
      }

      .hero {
        font-size: 24px;
        text-align: center;
        padding: 20px;
      }

      .container {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">STORE</div>

  <div class="nav-right">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">LOGIN</button>
  </div>
</header>

<div class="hero">
  NEW COLLECTION
</div>

<div class="container">
  <div id="products" class="products"></div>
</div>

<footer>
  © 2026 STORE — Minimal Fashion
</footer>

<script>
let token = localStorage.getItem("token") || '';

async function login(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  });

  const data = await res.json();

  if(!data.token){
    alert("Login failed");
    return;
  }

  token = data.token;
  localStorage.setItem("token", token);

  loadProducts();
}

async function loadProducts(){
  const container = document.getElementById('products');
  container.innerHTML = "Loading...";

  const res = await fetch('https://clothing-store-2-vahe.onrender.com/products');
  const data = await res.json();

  container.innerHTML = '';

  data.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" />
        <h3>${p.name}</h3>
        <div class="price">₹${p.price}</div>
      </div>
    `;
  });
}

if(token){
  loadProducts();
}
</script>

</body>
</html>
