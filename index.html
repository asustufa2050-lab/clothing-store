<!DOCTYPE html>
<html>
<head>
  <title>STORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}
body{background:#0f0f0f;color:#fff;}

header{
  display:flex;justify-content:space-between;
  padding:15px 30px;background:#111;border-bottom:1px solid #222;
}

button{
  background:#6366f1;border:none;padding:8px 12px;
  color:#fff;border-radius:6px;cursor:pointer;
}

.products{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{background:#181818;border-radius:10px;overflow:hidden;}
.card img{width:100%;height:220px;object-fit:cover;}

.filters{
  display:flex;gap:10px;padding:10px;
}

select,input{padding:6px;background:#111;border:1px solid #333;color:#fff;}

.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;justify-content:center;align-items:center;
}

.modal-content{
  background:#181818;padding:20px;border-radius:10px;width:90%;max-width:400px;
}

.close{cursor:pointer;float:right;}
</style>
</head>

<body>

<header>
  <h3>STORE</h3>
  <div>
    <button onclick="openWishlist()">❤️ Wishlist</button>
    <button onclick="openAdmin()">Admin</button>
  </div>
</header>

<!-- FILTERS -->
<div class="filters">
  <select id="category">
    <option value="">All</option>
    <option value="shirt">Shirt</option>
    <option value="hoodie">Hoodie</option>
  </select>

  <select id="size">
    <option value="">Size</option>
    <option>S</option><option>M</option><option>L</option>
  </select>

  <input type="number" id="maxPrice" placeholder="Max ₹">

  <button onclick="applyFilters()">Apply</button>
</div>

<div class="products" id="products"></div>

<!-- WISHLIST -->
<div class="modal" id="wishlistModal">
  <div class="modal-content" id="wishlistContent"></div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
  <div class="modal-content">
    <span class="close" onclick="adminModal.style.display='none'">✖</span>
    <h3>Add Product</h3>
    <input id="pname" placeholder="Name">
    <input id="pprice" placeholder="Price">
    <input id="pimage" placeholder="Image URL">
    <button onclick="addProduct()">Add</button>
  </div>
</div>

<script>
let productsData = [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

// LOAD PRODUCTS
async function loadProducts(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/products');
  productsData = await res.json();
  render(productsData);
}

// RENDER
function render(data){
  products.innerHTML='';
  data.forEach(p=>{
    products.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <button onclick="addWishlist('${p._id}','${p.name}',${p.price})">❤️</button>
      </div>
    `;
  });
}

// FILTER
function applyFilters(){
  let filtered = productsData;

  const cat = category.value;
  const size = size.value;
  const max = maxPrice.value;

  if(cat) filtered = filtered.filter(p=>p.category===cat);
  if(size) filtered = filtered.filter(p=>p.size===size);
  if(max) filtered = filtered.filter(p=>p.price <= max);

  render(filtered);
}

// WISHLIST
function addWishlist(id,name,price){
  wishlist.push({id,name,price});
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
}

function openWishlist(){
  wishlistModal.style.display='flex';
  let html='<span class="close" onclick="wishlistModal.style.display=\'none\'">✖</span><h3>Wishlist</h3>';
  wishlist.forEach(i=>{
    html+=`<p>${i.name} - ₹${i.price}</p>`;
  });
  wishlistContent.innerHTML=html;
}

// ADMIN
function openAdmin(){
  adminModal.style.display='flex';
}

async function addProduct(){
  await fetch('https://clothing-store-2-vahe.onrender.com/products',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name:pname.value,
      price:pprice.value,
      image:pimage.value
    })
  });

  alert("Product added");
  adminModal.style.display='none';
  loadProducts();
}

// INIT
loadProducts();
</script>

</body>
</html>
