<!DOCTYPE html>
<html>
<head>
  <title>Clothing Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: #fff;
      color: #111;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: white;
    }

    .logo {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .nav-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input {
      padding: 8px;
      border: 1px solid #ddd;
      font-size: 12px;
    }

    button {
      padding: 8px 12px;
      border: 1px solid black;
      background: black;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover {
      background: white;
      color: black;
    }

    .hero {
      height: 60vh;
      background: url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
      letter-spacing: 4px;
    }

    .container {
      padding: 40px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 40px;
    }

    .card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
    }

    .card h3 {
      font-size: 14px;
      margin: 10px 0 5px;
    }

    .price {
      font-size: 13px;
      color: #555;
    }

    footer {
      margin-top: 60px;
      padding: 40px;
      text-align: center;
      font-size: 12px;
      color: #777;
      border-top: 1px solid #eee;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">STORE</div>

  <div class="nav-right">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">LOGIN</button>
<button onclick="register()">SIGN UP</button>

    <span>🛒 <span id="cart-count">0</span></span>
    <button onclick="viewCart()">Cart</button>
  </div>
</header>

<div class="hero">NEW COLLECTION</div>

<div class="container">
  <div id="products" class="products"></div>
</div>

<footer>
  © 2026 STORE — Minimal Fashion
</footer>

<script>
let token = localStorage.getItem("token") || '';
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// ================= LOGIN =================
async function register(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  });

  const data = await res.json();

  if(data.message){
    alert("Registered! Logging in...");
login();
  } else {
    alert("Signup failed");
  }
}
  async function login(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  });

  const data = await res.json();

  if(!data.token){
    alert("Login failed");
    return;
  }

  token = data.token;
  localStorage.setItem("token", token);

  alert("Login successful");
  loadProducts();
}

// ================= LOAD PRODUCTS =================
async function loadProducts(){
  const container = document.getElementById('products');
  container.innerHTML = "Loading...";

  const res = await fetch('https://clothing-store-2-vahe.onrender.com/products');
  const data = await res.json();

  container.innerHTML = '';

  data.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" />
        <h3>${p.name}</h3>
        <div class="price">₹${p.price}</div>
        <button onclick='addToCart(${JSON.stringify(p)})'>ADD</button>
      </div>
    `;
  });
}

// ================= CART =================
function addToCart(product){
  const item = cart.find(i => i.id === product._id);

  if(item){
    item.quantity += 1;
  } else {
    cart.push({ id: product._id, name: product.name, price: product.price, quantity: 1 });
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
  alert("Added to cart");
}

function updateCart(){
  const count = cart.reduce((sum, i) => sum + i.quantity, 0);
  document.getElementById("cart-count").innerText = count;
}

function viewCart(){
  let text = "Cart:\n\n";
  let total = 0;

  cart.forEach(item => {
    const subtotal = item.price * item.quantity;
    total += subtotal;
    text += `${item.name} x ${item.quantity} = ₹${subtotal}\n`;
  });

  text += `\nTotal: ₹${total}`;
  alert(text);
}

// ================= INIT =================
updateCart();

loadProducts();
</script>

</body>
</html>
