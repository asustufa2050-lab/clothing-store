<!DOCTYPE html>
<html>
<head>
  <title>STORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    /* NAVBAR */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(15,15,15,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
    }

    .logo {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 3px;
    }

    .nav-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    input {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      font-size: 12px;
      width: 100px;
    }

    button {
      background: #6366f1;
      border: none;
      padding: 8px 10px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover {
      background: #4f46e5;
    }

    /* HERO */
    .hero {
      height: 65vh;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3), #0f0f0f),
                  url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 600;
      letter-spacing: 4px;
    }

    /* PRODUCTS */
    .container {
      padding: 30px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: #181818;
      border-radius: 16px;
      overflow: hidden;
      padding-bottom: 10px;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .card h3 {
      font-size: 14px;
      margin: 10px;
    }

    .price {
      font-size: 13px;
      color: #aaa;
      margin: 0 10px;
    }

    .card button {
      margin: 10px;
      width: calc(100% - 20px);
    }

    /* FOOTER */
    footer {
      margin-top: 50px;
      padding: 30px;
      text-align: center;
      color: #777;
      border-top: 1px solid #222;
      font-size: 12px;
    }

    /* MOBILE */
    @media(max-width: 768px) {
      header {
        flex-direction: column;
        gap: 10px;
      }

      .hero {
        font-size: 24px;
        height: 40vh;
        text-align: center;
      }

      .products {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">STORE</div>

  <div class="nav-right">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="register()">Sign Up</button>

    <span>🛒 <span id="cart-count">0</span></span>
    <button onclick="viewCart()">Cart</button>
  </div>
</header>

<div class="hero">NEW COLLECTION</div>

<div class="container">
  <div id="products" class="products"></div>
</div>

<footer>
  © 2026 STORE — Minimal Fashion
</footer>

<script>
let token = localStorage.getItem("token") || '';
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// REGISTER
async function register(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if(data.message){
    alert("Registered!");
    login();
  } else {
    alert("Signup failed");
  }
}

// LOGIN
async function login(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if(!data.token){
    alert("Login failed");
    return;
  }

  token = data.token;
  localStorage.setItem("token", token);

  alert("Login success");
}

// LOAD PRODUCTS
async function loadProducts(){
  const container = document.getElementById('products');
  container.innerHTML = "Loading...";

  const res = await fetch('https://clothing-store-2-vahe.onrender.com/products');
  const data = await res.json();

  container.innerHTML = '';

  data.forEach(p=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" />
        <h3>${p.name}</h3>
        <div class="price">₹${p.price}</div>
        <button onclick="addToCart('${p._id}','${p.name}',${p.price})">Add to Cart</button>
      </div>
    `;
  });
}

// CART
function addToCart(id, name, price){
  const item = cart.find(i => i.id === id);

  if(item){
    item.quantity += 1;
  } else {
    cart.push({ id, name, price, quantity: 1 });
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function updateCart(){
  const count = cart.reduce((sum, i) => sum + i.quantity, 0);
  document.getElementById("cart-count").innerText = count;
}

function viewCart(){
  let text = "Cart:\n\n";
  let total = 0;

  cart.forEach(item => {
    const subtotal = item.price * item.quantity;
    total += subtotal;
    text += `${item.name} x ${item.quantity} = ₹${subtotal}\n`;
  });

  text += `\nTotal: ₹${total}`;
  alert(text);
}

// INIT
updateCart();
loadProducts();
</script>

</body>
</html>
