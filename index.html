<!DOCTYPE html>
<html>
<head>
  <title>STORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}

    body{background:#0f0f0f;color:#fff;}

    header{
      display:flex;justify-content:space-between;align-items:center;
      padding:15px 30px;background:#111;border-bottom:1px solid #222;
      position:sticky;top:0;z-index:100;
    }

    .logo{letter-spacing:3px;font-weight:600;}

    .nav-right{display:flex;gap:10px;align-items:center;}

    button{
      background:#6366f1;border:none;padding:8px 12px;
      color:#fff;border-radius:6px;cursor:pointer;
    }

    .hero{
      height:60vh;
      background:url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b') center/cover;
      display:flex;align-items:center;justify-content:center;
      font-size:40px;font-weight:600;
    }

    .products{
      padding:30px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:#181818;border-radius:12px;overflow:hidden;
    }

    .card img{width:100%;height:260px;object-fit:cover;}

    .card h3{padding:10px;font-size:14px;}

    .price{padding:0 10px;color:#aaa;font-size:13px;}

    .card button{margin:10px;width:calc(100% - 20px);}

    /* MODALS */
    .modal{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.8);
      display:none;justify-content:center;align-items:center;
    }

    .modal-content{
      background:#181818;padding:20px;border-radius:10px;
      width:90%;max-width:400px;
    }

    input{
      width:100%;padding:8px;margin:5px 0;
      background:#111;border:1px solid #333;color:#fff;
    }

    .close{float:right;cursor:pointer;}

    /* MOBILE */
    @media(max-width:768px){
      .products{grid-template-columns:repeat(2,1fr);}
      .hero{font-size:24px;height:40vh;}
    }
  </style>
</head>

<body>

<header>
  <div class="logo">STORE</div>
  <div class="nav-right">
    <button onclick="openLogin()">Login</button>
    <span>🛒 <span id="cart-count">0</span></span>
    <button onclick="openCart()">Cart</button>
  </div>
</header>

<div class="hero">NEW COLLECTION</div>

<div class="products" id="products"></div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <span class="close" onclick="closeLogin()">✖</span>
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Sign Up</button>
  </div>
</div>

<!-- PRODUCT DETAIL MODAL -->
<div class="modal" id="productModal">
  <div class="modal-content" id="productDetail"></div>
</div>

<!-- CART MODAL -->
<div class="modal" id="cartModal">
  <div class="modal-content" id="cartContent"></div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let token = localStorage.getItem("token") || '';

// LOGIN MODAL
function openLogin(){loginModal.style.display='flex';}
function closeLogin(){loginModal.style.display='none';}

// CART MODAL
function openCart(){
  cartModal.style.display='flex';
  renderCart();
}
function closeCart(){cartModal.style.display='none';}

// PRODUCT MODAL
function openProduct(p){
  productModal.style.display='flex';
  productDetail.innerHTML = `
    <span class="close" onclick="productModal.style.display='none'">✖</span>
    <img src="${p.image}" style="width:100%;height:250px;object-fit:cover;">
    <h3>${p.name}</h3>
    <p>₹${p.price}</p>
    <button onclick="addToCart('${p._id}','${p.name}',${p.price})">Add to Cart</button>
  `;
}

// AUTH
async function login(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email.value,password:password.value})
  });
  const data = await res.json();
  if(data.token){
    localStorage.setItem("token", data.token);
    alert("Login success");
    closeLogin();
  } else alert("Login failed");
}

async function register(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email.value,password:password.value})
  });
  const data = await res.json();
  if(data.message){
    alert("Registered");
    login();
  }
}

// PRODUCTS
async function loadProducts(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/products');
  const data = await res.json();

  products.innerHTML = '';

  data.forEach(p=>{
    products.innerHTML += `
      <div class="card" onclick='openProduct(${JSON.stringify(p)})'>
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <div class="price">₹${p.price}</div>
      </div>
    `;
  });
}

// CART
function addToCart(id,name,price){
  const item = cart.find(i=>i.id===id);
  if(item) item.quantity++;
  else cart.push({id,name,price,quantity:1});

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function updateCart(){
  cart-count.innerText = cart.reduce((s,i)=>s+i.quantity,0);
}

function renderCart(){
  let html = `<span class="close" onclick="closeCart()">✖</span><h3>Cart</h3>`;
  let total=0;

  cart.forEach(i=>{
    total+=i.price*i.quantity;
    html+=`<p>${i.name} x ${i.quantity} = ₹${i.price*i.quantity}</p>`;
  });

  html+=`<h4>Total: ₹${total}</h4>`;
  cartContent.innerHTML=html;
}

// INIT
updateCart();
loadProducts();
</script>

</body>
</html>
