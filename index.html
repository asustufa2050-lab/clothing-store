<!DOCTYPE html>
<html>
<head>
  <title>STORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}

    body{background:#0f0f0f;color:#fff;}

    header{
      display:flex;justify-content:space-between;align-items:center;
      padding:15px 30px;background:#111;border-bottom:1px solid #222;
    }

    .logo{letter-spacing:3px;font-weight:600;}

    .nav-right{display:flex;gap:10px;align-items:center;}

    button{
      background:#6366f1;border:none;padding:8px 12px;
      color:#fff;border-radius:6px;cursor:pointer;
    }

    button:hover{background:#4f46e5;}

    .hero{
      height:60vh;
      background:url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b') center/cover;
      display:flex;align-items:center;justify-content:center;
      font-size:40px;font-weight:600;
    }

    .products{
      padding:30px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:#181818;border-radius:12px;overflow:hidden;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:0 10px 25px rgba(0,0,0,0.5);
    }

    .card img{width:100%;height:260px;object-fit:cover;}

    .card h3{padding:10px;font-size:14px;}

    .price{padding:0 10px;color:#aaa;font-size:13px;}

    .card button{margin:10px;width:calc(100% - 20px);}

    /* MODALS */
    .modal{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.8);
      display:none;justify-content:center;align-items:center;
      z-index:200;
    }

    .modal-content{
      background:#181818;padding:20px;border-radius:10px;
      width:90%;max-width:400px;
    }

    .close{float:right;cursor:pointer;}

    input{
      width:100%;padding:8px;margin:5px 0;
      background:#111;border:1px solid #333;color:#fff;
    }
    .img-container {
  position: relative;
  overflow: hidden;
}

.img-container img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.08);
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 10px;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  opacity: 0;
  transition: 0.3s;
}

.card:hover .overlay {
  opacity: 1;
}

.card-info {
  padding: 10px;
}

.price-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.wishlist {
  cursor: pointer;
}

    /* MOBILE */
    @media(max-width:768px){
      .products{grid-template-columns:repeat(2,1fr);}
      .hero{font-size:24px;height:40vh;}
    }
    .footer {
  margin-top: 60px;
  padding: 40px 20px;
  background: #111;
  border-top: 1px solid #222;
  text-align: center;
}

.footer h2 {
  letter-spacing: 3px;
  margin-bottom: 10px;
}

.footer p {
  color: #aaa;
  font-size: 13px;
}

.footer-links {
  margin: 15px 0;
  display: flex;
  justify-content: center;
  gap: 20px;
  font-size: 12px;
}

.footer-links span {
  cursor: pointer;
  transition: 0.2s;
}

.footer-links span:hover {
  color: #6366f1;
}
  </style>
</head>

<body>

<header>
  <div class="logo">STORE</div>

  <div class="nav-right">
    <button onclick="openLogin()">Login</button>

    <span>🛒 <span id="cart-count">0</span></span>
    <button onclick="openCart()">Cart</button>

    <button onclick="openWishlist()">❤️</button>
    <button onclick="openAdmin()">Admin</button>
  </div>
</header>

<div class="hero">NEW COLLECTION</div>

<div class="products" id="products"></div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('loginModal')">✖</span>
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Sign Up</button>
  </div>
</div>

<!-- CART -->
<div class="modal" id="cartModal">
  <div class="modal-content" id="cartContent"></div>
</div>

<!-- WISHLIST -->
<div class="modal" id="wishlistModal">
  <div class="modal-content" id="wishlistContent"></div>
</div>

<!-- PRODUCT DETAIL -->
<div class="modal" id="productModal">
  <div class="modal-content" id="productDetail"></div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('adminModal')">✖</span>
    <h3>Add Product</h3>
    <input id="pname" placeholder="Name">
    <input id="pprice" placeholder="Price">
    <input id="pimage" placeholder="Image URL">
    <button onclick="addProduct()">Add</button>
  </div>
</div>

<script>
// ================= STATE =================
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let token = localStorage.getItem("token") || '';

// ================= MODALS =================
function openLogin(){ show('loginModal'); }
function openCart(){ show('cartModal'); renderCart(); }
function openWishlist(){ show('wishlistModal'); renderWishlist(); }
function openAdmin(){ show('adminModal'); }

function show(id){ document.getElementById(id).style.display='flex'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }

// ================= AUTH =================
async function login(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email.value,password:password.value})
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    alert("Login success");
    closeModal('loginModal');
  } else alert("Login failed");
}

async function register(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email.value,password:password.value})
  });

  const data = await res.json();

  if(data.message){
    alert("Registered");
    login();
  }
}

// ================= PRODUCTS =================
async function loadProducts(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/products');
  const data = await res.json();

  products.innerHTML = '';

  data.forEach(p => {
    products.innerHTML += `
      <div class="card">

        <div class="img-container" onclick='openProduct(${JSON.stringify(p)})'>
          <img src="${p.image}">
          <div class="overlay">
            <button onclick="event.stopPropagation(); addToCart('${p._id}','${p.name}',${p.price})">
              Add to Cart
            </button>
          </div>
        </div>

        <div class="card-info">
          <h3>${p.name}</h3>
          <div class="price-row">
            <span class="price">₹${p.price}</span>
            <span class="wishlist" onclick="addWishlist('${p._id}','${p.name}',${p.price})">❤️</span>
          </div>
        </div>

      </div>
    `;
  });
}

// ================= CART =================
function addToCart(id,name,price){
  const item = cart.find(i=>i.id===id);
  if(item) item.quantity++;
  else cart.push({id,name,price,quantity:1});

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCart();
}

function updateCart(){
  const count = cart.reduce((s,i)=>s+i.quantity,0);
  document.getElementById("cart-count").innerText = count;
}

function renderCart(){
  let html=`<span class="close" onclick="closeModal('cartModal')">✖</span><h3>Cart</h3>`;
  let total=0;

  cart.forEach(i=>{
    total+=i.price*i.quantity;
    html+=`<p>${i.name} x ${i.quantity} = ₹${i.price*i.quantity}</p>`;
  });

  html+=`<h4>Total: ₹${total}</h4>`;
  cartContent.innerHTML=html;
}

// ================= WISHLIST =================
function addWishlist(id,name,price){
  wishlist.push({id,name,price});
  localStorage.setItem("wishlist", JSON.stringify(wishlist));
}

function renderWishlist(){
  let html=`<span class="close" onclick="closeModal('wishlistModal')">✖</span><h3>Wishlist</h3>`;

  wishlist.forEach(i=>{
    html+=`<p>${i.name} - ₹${i.price}</p>`;
  });

  wishlistContent.innerHTML=html;
}

// ================= ADMIN =================
async function addProduct(){
  await fetch('https://clothing-store-2-vahe.onrender.com/products',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name:pname.value,
      price:pprice.value,
      image:pimage.value
    })
  });

  alert("Product added");
  closeModal('adminModal');
  loadProducts();
}

// ================= INIT =================
updateCart();
loadProducts();
</script>
<footer class="footer">
  <div class="footer-content">
    <h2>STORE</h2>
    <p>Minimal fashion. Maximum impact.</p>

    <div class="footer-links">
      <span>About</span>
      <span>Contact</span>
      <span>Privacy</span>
    </div>

    <p class="copyright">© 2026 STORE</p>
  </div>
</footer>
</body>
</html>
