<!DOCTYPE html>
<html>
<head>
  <title>STORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}
    body{background:#0f0f0f;color:#fff;}

    header{
      display:flex;justify-content:space-between;align-items:center;
      padding:15px 30px;background:#111;border-bottom:1px solid #222;
    }

    .logo{font-weight:600;letter-spacing:3px;}

    .nav-right{display:flex;gap:10px;align-items:center;}

    button{
      background:#6366f1;border:none;padding:8px 12px;
      color:#fff;border-radius:6px;cursor:pointer;
    }

    .hero{
      height:50vh;
      background:url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b') center/cover;
      display:flex;align-items:center;justify-content:center;
      font-size:32px;font-weight:600;
    }

    .products{
      padding:30px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:#181818;border-radius:12px;overflow:hidden;
      transition:0.3s;border:1px solid #222;
    }

    .card:hover{transform:translateY(-5px);}

    .img-container{position:relative;overflow:hidden;}

    .img-container img{
      width:100%;height:260px;object-fit:cover;
      transition:0.4s;
    }

    .card:hover img{transform:scale(1.08);}

    .overlay{
      position:absolute;bottom:0;width:100%;
      background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
      padding:10px;opacity:0;transition:0.3s;
    }

    .card:hover .overlay{opacity:1;}

    .card-info{padding:10px;}

    .price-row{
      display:flex;justify-content:space-between;
      align-items:center;
    }

    .wishlist{cursor:pointer;}

    .modal{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.8);
      display:none;justify-content:center;align-items:center;
    }

    .modal-content{
      background:#181818;padding:20px;border-radius:10px;
      width:90%;max-width:400px;
    }

    input{
      width:100%;padding:8px;margin:5px 0;
      background:#111;border:1px solid #333;color:#fff;
    }

    .footer{
      margin-top:50px;padding:30px;background:#111;text-align:center;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">STORE</div>

  <div class="nav-right">
    <span id="userText"></span>
    <button onclick="openLogin()">Login</button>
    <button id="adminBtn" onclick="openAdmin()" style="display:none;">Admin</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="hero">NEW COLLECTION</div>
<div class="products" id="products"></div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Sign Up</button>
  </div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
  <div class="modal-content">
    <input id="pname" placeholder="Name">
    <input id="pprice" placeholder="Price">
    <input id="pimage" placeholder="Image">
    <button onclick="addProduct()">Add Product</button>
  </div>
</div>

<footer class="footer">© 2026 STORE</footer>

<script>
let token = localStorage.getItem("token") || "";
let isAdmin = localStorage.getItem("isAdmin") === "true";

function openLogin(){loginModal.style.display='flex';}
function openAdmin(){adminModal.style.display='flex';}

function logout(){
  localStorage.clear();
  location.reload();
}

async function login(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email.value,password:password.value})
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    localStorage.setItem("isAdmin", data.isAdmin);

    if(data.isAdmin){
      adminBtn.style.display="block";
    }

    userText.innerText = "Logged in";
    loginModal.style.display="none";
  }
}

async function register(){
  await fetch('https://clothing-store-2-vahe.onrender.com/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email.value,password:password.value})
  });

  login();
}

async function loadProducts(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/products');
  const data = await res.json();

  products.innerHTML="";

  data.forEach(p=>{
    products.innerHTML+=`
      <div class="card">
        <div class="img-container">
          <img src="${p.image}">
          <div class="overlay">
            <button onclick="addToCart('${p._id}','${p.name}',${p.price}')">Add</button>
          </div>
        </div>
        <div class="card-info">
          <h3>${p.name}</h3>
          <div class="price-row">
            <span>₹${p.price}</span>
            <span class="wishlist">❤️</span>
          </div>
        </div>
      </div>
    `;
  });
}

async function addProduct(){
  const token = localStorage.getItem("token");

  const res = await fetch('https://clothing-store-2-vahe.onrender.com/products',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization': token
    },
    body:JSON.stringify({
      name:pname.value,
      price:pprice.value,
      image:pimage.value
    })
  });

  if(res.status===403){
    alert("Admin only");
    return;
  }

  alert("Added");
  loadProducts();
}

function addToCart(){alert("Cart working");}

if(isAdmin){
  adminBtn.style.display="block";
}

loadProducts();
</script>

</body>
</html>
