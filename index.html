<!DOCTYPE html>
<html>
<head>
  <title>Store</title>
</head>
<body>

<h1>Clothing Store</h1>

<input id="email" placeholder="Email" />
<input id="password" placeholder="Password" type="password" />
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<h2>Products</h2>
<div id="products"></div>

<script>
let token = '';

async function register(){
  await fetch('https://clothing-store-2-vahe.onrender.com/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  });
  alert('Registered');
}

async function login(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  });
  const data = await res.json();
  token = data.token;
  loadProducts();
}

async function loadProducts(){
  const res = await fetch('https://clothing-store-2-vahe.onrender.com/products');
  const data = await res.json();

  const container = document.getElementById('products');
  container.innerHTML='';

  data.forEach(p=>{
    container.innerHTML += `<div>
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <img src="${p.image}" width="100"/>
    </div>`;
  });
}
</script>

</body>
</html>
