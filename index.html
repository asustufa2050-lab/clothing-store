<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter';}
body{background:#0e0e0e;color:#fff;}

/* NAV */
header{
  display:flex;justify-content:space-between;
  padding:20px 40px;border-bottom:1px solid #222;
}
.logo{letter-spacing:4px;font-weight:600;}
.nav button{background:none;border:none;color:#fff;margin-left:15px;cursor:pointer;}

/* HERO */
.hero{
  height:70vh;
  background:url('https://images.unsplash.com/photo-1523381210434-271e8be1f52b') center/cover;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;font-weight:600;
}

/* FILTER */
.filters{
  padding:20px 40px;display:flex;gap:10px;
}
select{
  background:#111;color:#fff;border:1px solid #333;padding:8px;
}

/* PRODUCTS */
.products{
  padding:40px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:30px;
}

.card{cursor:pointer;}
.img{height:320px;overflow:hidden;}
.img img{width:100%;height:100%;object-fit:cover;transition:0.4s;}
.card:hover img{transform:scale(1.1);}
.info{margin-top:10px;}
.price{color:#aaa;font-size:14px;}

/* DRAWERS */
.drawer{
  position:fixed;top:0;right:-100%;
  width:100%;max-width:400px;height:100%;
  background:#111;transition:0.4s;z-index:200;
  padding:30px;
}
.drawer.active{right:0;}

/* INPUT */
input{
  width:100%;padding:12px;margin:10px 0;
  background:#0e0e0e;border:1px solid #333;color:#fff;
}

/* BUTTON */
.main-btn{
  width:100%;padding:12px;background:#fff;color:#000;border:none;
}

/* FOOTER */
footer{
  padding:30px;text-align:center;background:#111;margin-top:40px;
}
/* CART UPGRADE */
.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:15px 0;
  border-bottom:1px solid #222;
  padding-bottom:10px;
}

.qty{
  display:flex;
  gap:8px;
  align-items:center;
}

.qty button{
  background:#222;
  border:none;
  color:#fff;
  width:25px;
  height:25px;
  cursor:pointer;
}

/* SUMMARY */
#cartSummary{
  position:absolute;
  bottom:20px;
  left:30px;
  right:30px;
}

#total,#checkoutTotal{
  margin:15px 0;
  color:#aaa;
}

/* EMPTY CART */
.empty{
  color:#666;
  margin-top:20px;
}

/* PREMIUM TOUCH */
.drawer{
  backdrop-filter: blur(10px);
}
</style>
</head>

<body>

<header>
  <div class="logo">STORE</div>
  <div class="nav">
    <button onclick="openAuth()">Account</button>
    <button onclick="openCart()">Cart</button>
  </div>
</header>

<div class="hero">NEW COLLECTION</div>

<div class="filters">
  <select id="category" onchange="loadProducts()">
    <option value="">All</option>
    <option value="men">Men</option>
    <option value="women">Women</option>
  </select>

  <select id="size" onchange="loadProducts()">
    <option value="">Size</option>
    <option>S</option>
    <option>M</option>
    <option>L</option>
  </select>
</div>

<div class="products" id="products"></div>

<!-- AUTH -->
<div class="drawer" id="authDrawer">
  <h2 id="authTitle">Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button class="main-btn" onclick="auth()">Continue</button>
  <p onclick="toggleAuth()" id="switchText">Create account</p>
</div>

<!-- CART -->
<div class="drawer" id="cartDrawer">
  <h2>Cart</h2>
  <div id="cartItems"></div>

  <!-- ADD THIS -->
  <div id="cartSummary">
    <p id="total"></p>
    <button class="main-btn" onclick="openCheckout()">Checkout</button>
  </div>
</div>

<footer>© 2026 STORE</footer>

<script>
let isLogin=true;
let cart=[];

function openAuth(){authDrawer.classList.add("active");}
function openCart(){cartDrawer.classList.add("active"); renderCart();}

function toggleAuth(){
  isLogin=!isLogin;
  authTitle.innerText=isLogin?"Login":"Sign Up";
}

async function auth(){
  const url=isLogin?"login":"register";

  const res=await fetch(`https://clothing-store-2-vahe.onrender.com/${url}`,{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email.value,password:password.value})
  });

  const data=await res.json();

  if(isLogin){
    if(data.token){
      localStorage.setItem("token",data.token);
      alert("Logged in");
      authDrawer.classList.remove("active");
    }
  }else{
    alert("Account created");
    toggleAuth();
  }
}

async function loadProducts(){
  let url="https://clothing-store-2-vahe.onrender.com/products?";
  if(category.value) url+=`category=${category.value}&`;
  if(size.value) url+=`size=${size.value}`;

  const res=await fetch(url);
  const data=await res.json();

  products.innerHTML="";

  data.forEach(p=>{
    products.innerHTML+=`
      <div class="card">
        <div class="img">
          <img src="${p.image}">
        </div>
        <div class="info">
          <h4>${p.name}</h4>
          <p class="price">₹${p.price}</p>
          <button class="main-btn" onclick="addToCart('${p.name}',${p.price})">Add</button>
        </div>
      </div>
    `;
  });
}

function addToCart(name,price){
  cart.push({name,price});
}

function renderCart(){
  cartItems.innerHTML="";
  cart.forEach(i=>{
    cartItems.innerHTML+=`<p>${i.name} - ₹${i.price}</p>`;
  });
}

loadProducts();
/* ===== CART UPGRADE ===== */

/* override addToCart */
function addToCart(name,price){
  const item=cart.find(i=>i.name===name);

  if(item){
    item.qty++;
  }else{
    cart.push({name,price,qty:1});
  }
}

/* render cart upgraded */
function renderCart(){
  cartItems.innerHTML="";

  if(cart.length===0){
    cartItems.innerHTML="<p class='empty'>Your cart is empty</p>";
    total.innerText="";
    return;
  }

  let sum=0;

  cart.forEach((item,index)=>{
    sum+=item.price*item.qty;

    cartItems.innerHTML+=`
      <div class="cart-item">
        <div>
          <p>${item.name}</p>
          <small>₹${item.price}</small>
        </div>

        <div class="qty">
          <button onclick="changeQty(${index},-1)">-</button>
          <span>${item.qty}</span>
          <button onclick="changeQty(${index},1)">+</button>
        </div>

        <button onclick="removeItem(${index})">x</button>
      </div>
    `;
  });

  total.innerText="Total: ₹"+sum;
}

/* qty change */
function changeQty(i,delta){
  cart[i].qty+=delta;
  if(cart[i].qty<=0) cart.splice(i,1);
  renderCart();
}

/* remove */
function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

/* ===== CHECKOUT ===== */

function openCheckout(){
  checkoutDrawer.classList.add("active");
  renderCheckout();
}

function renderCheckout(){
  checkoutItems.innerHTML="";
  let sum=0;

  cart.forEach(item=>{
    sum+=item.price*item.qty;

    checkoutItems.innerHTML+=`
      <p>${item.name} x${item.qty} - ₹${item.price*item.qty}</p>
    `;
  });

  checkoutTotal.innerText="Total: ₹"+sum;
}

function placeOrder(){
  alert("Order placed successfully 🎉");
  cart=[];
  checkoutDrawer.classList.remove("active");
  cartDrawer.classList.remove("active");
  renderCart();
}
</script>
<!-- CHECKOUT DRAWER -->
<div class="drawer" id="checkoutDrawer">
  <h2>Checkout</h2>

  <h4>Shipping</h4>
  <input placeholder="Full Name">
  <input placeholder="Address">
  <input placeholder="City">
  <input placeholder="ZIP Code">

  <h4>Payment</h4>
  <input placeholder="Card Number">
  <input placeholder="Expiry">
  <input placeholder="CVV">

  <h4>Order</h4>
  <div id="checkoutItems"></div>
  <p id="checkoutTotal"></p>

  <button class="main-btn" onclick="placeOrder()">Place Order</button>
</div>
</body>
</html>
